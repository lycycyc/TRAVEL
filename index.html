<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>TRAVEL</title>

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background-color: black;
            text-align: center;
            font-family: sans-serif;
            color: white;
        }

        .menu-icon {
            position: fixed;
            top: 15px; left: 15px;
            font-size: 25px; color: white;
            cursor: pointer; z-index: 2100;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px; border-radius: 5px;
        }

        ul#sideMenu {
            list-style-type: none; margin: 0; padding: 80px 0 0 0;
            width: 250px; background-color: #000;
            position: fixed; height: 100%; left: -250px;
            transition: 0.3s; z-index: 2000; overflow-y: auto;
        }

        ul#sideMenu.open {
            left: 0;
        }

        .home-link {
            display: block; color: white; padding: 20px 16px;
            text-decoration: none; font-weight: bold;
        }

        .home-link:hover {
            background-color: #FFE4C4;
            color: black;
        }

        .country-btn {
            display: block; width: 100%; padding: 20px 16px;
            color: white; background: #000; border: none;
            cursor: pointer; text-align: center;
            font-size: 1.1rem; font-weight: bold; transition: 0.3s;
        }

        .country-btn:hover {
            background-color: #111;
            color: #FFE4C4;
        }

        .city-list {
            list-style-type: none; padding: 0; margin: 0;
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease-out; background-color: #0a0a0a;
        }

        .city-list.active {
            max-height: 300px;
        }

        .city-list li a {
            display: block; color: #bbb;
            padding: 15px 16px;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .city-list li a:hover {
            background-color: #FFE4C4;
            color: black;
        }

        header {
            background: #FFE4C4;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 50px 20px; 
            text-align: center;
        }

        h1 {
            color: black;
            font-size: 3rem;
            margin: 0;
            letter-spacing: 4px;
        }

        .content-div {
            padding: 50px 16px 50px 16px; 
            max-width: 650px;
            margin: 0 auto;
        }

        .header-stats {
            display: flex; justify-content: space-around;
            align-items: flex-end;
            background: #111;
            padding: 30px 20px;
            border-radius: 20px;
            margin-bottom: 60px;
            border: 1px solid #333;
        }

        .stat-item .val {
            font-size: 2rem;
            font-weight: bold;
            color: #FFE4C4;
            display: block;
        }

        .stat-item .lab {
            font-size: 1.8rem;
            margin-top: 8px;
            display: block;
        }

        .stat-item.total-item .val {
            font-size: 3.8rem;
            line-height: 1;
        } 

        .stat-item.total-item .lab {
            color: #FFE4C4;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .timeline-container {
            position: relative;
            padding-left: 60px; 
            text-align: left;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            left: 20px; top: 0;
            width: 4px; height: 100%;
            background: linear-gradient(to bottom, #FFE4C4, #333);
        }

        .trip-card {
            background: #111;
            margin-bottom: 40px;
            border-radius: 15px;
            padding: 25px;
            position: relative;
            border: 1px solid #222;
        }

        .trip-card::before {
            content: '';
            position: absolute;
            left: -51px; top: 28px;
            width: 18px; height: 18px;
            background: black;
            border: 4px solid #FFE4C4;
            border-radius: 50%;
            z-index: 2;
        }

        .year-label {
            color: #FFE4C4;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 15px;
        }

        .loc-item {
            padding: 8px 0;
        }

        .loc-name {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        .cost-detail {
            display: flex;
            background: #000;
            padding: 15px;
            border-radius: 10px;
            gap: 20px;
            margin-top: 20px;
            border: 1px solid #222;
        }

        .cost-item {
            flex: 1;
        }

        .cost-item label {
            display: block;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 6px;
        }

        .cost-item span {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .total-highlight {
            color: #FFE4C4;
        }

        footer {
            background: #FFE4C4;
            padding: 50px 20px;
            text-align: center;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>

    <ul id="sideMenu">
        <li><a href="index.html" class="home-link">HOME</a></li>
        <li>
            <button class="country-btn" onclick="toggleCity(this)">🇰🇷 ▼</button>
            <ul class="city-list">
                <li><a href="2026busan.html">2026 BUSAN</a></li>
            </ul>
        </li>
    </ul>

    <header>
        <h1>✈</h1>
    </header>

    <div class="content-div" onclick="closeMenu()">
        <div class="header-stats">
            <div class="stat-item total-item"><span class="val">11</span><span class="lab"></span></div>
            <div class="stat-item"><span class="val">5</span><span class="lab">🇯🇵</span></div>
            <div class="stat-item"><span class="val">4</span><span class="lab">🇰🇷</span></div>
            <div class="stat-item"><span class="val">1</span><span class="lab">🇭🇰</span></div>
            <div class="stat-item"><span class="val">1</span><span class="lab">🇸🇬</span></div>
        </div>

        <div class="timeline-container">
            <div class="trip-card">
                <span class="year-label">2014</span>
                <div class="loc-item"><span class="loc-name">日本大阪+京都7日</span></div>
            </div>

            <div class="trip-card">
                <span class="year-label">2015</span>
                <div class="loc-item"><span class="loc-name">日本東京9日</span></div>
            </div>

            <div class="trip-card">
                <span class="year-label">2016</span>
                <div class="loc-item"><span class="loc-name">日本北海道+東京9日</span></div>
                <div class="loc-item" style="border-top: 1px solid #222; margin-top: 12px; padding-top: 12px;">
                    <span class="loc-name">香港3日</span>
                </div>
            </div>

            <div class="trip-card">
                <span class="year-label">2018</span>
                <div class="loc-item"><span class="loc-name">日本沖繩5日🚢</span></div>
            </div>

            <div class="trip-card">
                <span class="year-label">2019</span>
                <div class="loc-item"><span class="loc-name">韓國首爾9日</span></div>
                <div class="loc-item" style="border-top: 1px solid #222; margin-top: 12px; padding-top: 12px;">
                    <span class="loc-name">新加坡5日</span>
                </div>
            </div>

            <div class="trip-card">
                <span class="year-label">2020</span>
                <div class="loc-item"><span class="loc-name">韓國首爾7日</span></div>
                <div class="cost-detail">
                    <div class="cost-item"><label>不含機+酒</label><span>$17,323</span></div>
                    <div class="cost-item"><label>含機+酒</label><span class="total-highlight">$29,888</span></div>
                </div>
            </div>

            <div class="trip-card">
                <span class="year-label">2025</span>
                <div class="loc-item"><span class="loc-name">日本東京5日</span></div>
                <div class="cost-detail">
                    <div class="cost-item"><label>不含機+酒</label><span>$39,339</span></div>
                    <div class="cost-item"><label>含機+酒</label><span class="total-highlight">$56,267</span></div>
                </div>
            </div>

            <div class="trip-card">
                <span class="year-label">2026</span>
                <div class="loc-item"><span class="loc-name">韓國釜山10日</span></div>
                <div class="cost-detail">
                    <div class="cost-item"><label>不含機+酒</label><span>$39,234</span></div>
                    <div class="cost-item"><label>含機+酒</label><span class="total-highlight">$67,108</span></div>
                </div>
                <div class="loc-item" style="border-top: 1px solid #222; margin-top: 12px; padding-top: 12px;">
                    <span class="loc-name">韓國首爾5日</span>
                </div>
                <div class="cost-detail">
                    <div class="cost-item"><label>不含機+酒</label><span>$</span></div>
                    <div class="cost-item"><label>含機+酒</label><span class="total-highlight">$</span></div>
                </div>
            </div>
        </div> 
    </div>

    <footer>Edited by Jessica Liu</footer>

    <script>
        function toggleMenu() {
            document.getElementById("sideMenu").classList.toggle("open");
        }
        function closeMenu() {
            var menu = document.getElementById("sideMenu");
            if (menu.classList.contains("open")) {
                menu.classList.remove("open");
            }
        }
        function toggleCity(btn) {
            var cityList = btn.nextElementSibling;
            cityList.classList.toggle("active");
            btn.innerHTML = cityList.classList.contains("active") ? btn.innerHTML.replace("▼", "▲") : btn.innerHTML.replace("▲", "▼");
        }
    </script>
</body>
</html>
